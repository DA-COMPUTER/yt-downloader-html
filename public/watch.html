<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — ytdl</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .watch-shell { max-width: 900px; margin: 0 auto; padding: 24px 24px 80px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-family: var(--mono); color: var(--muted); text-decoration: none; margin-bottom: 20px; transition: color 0.12s; }
    .back-link:hover { color: var(--text); }
    .player-wrap { background: #000; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 16/9; width: 100%; position: relative; }
    .player-wrap video { width: 100%; height: 100%; display: block; }
    .player-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; color: var(--muted); font-family: var(--mono); font-size: 13px; flex-direction: column; gap: 12px; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .video-meta { margin-top: 16px; }
    .video-title { font-size: 18px; font-weight: 700; line-height: 1.3; }
    .video-sub { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-top: 6px; }
    .cache-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--mono); color: var(--muted); margin-top: 8px; }
    .cache-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .cache-dot.cached { background: var(--success); }
    .cache-dot.caching { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .action-bar { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
    .action-bar select { width: auto; }
    .progress-section { margin-top: 12px; display: none; flex-direction: column; gap: 6px; }
    .progress-section.visible { display: flex; }
    .progress-label { font-size: 11px; font-family: var(--mono); color: var(--muted); }
    .error-banner { display: none; margin-top: 16px; font-size: 13px; font-family: var(--mono); color: var(--danger); padding: 10px 14px; background: rgba(224,80,80,0.08); border: 0.5px solid rgba(224,80,80,0.2); border-radius: var(--radius); }
    .error-banner.visible { display: block; }
  </style>
</head>
<body>
<div class="watch-shell">

  <a class="back-link" href="/">← back</a>

  <div class="player-wrap" id="playerWrap">
    <div class="player-loading" id="playerLoading">
      <div class="spinner"></div>
      <span id="loadingText">Loading stream...</span>
    </div>
    <video id="videoEl" controls preload="metadata" style="display:none"></video>
  </div>

  <div class="video-meta">
    <div class="video-title" id="videoTitle">Loading...</div>
    <div class="video-sub" id="videoSub"></div>
    <div class="cache-status" id="cacheStatus">
      <div class="cache-dot" id="cacheDot"></div>
      <span id="cacheText">checking cache...</span>
    </div>
  </div>

  <div class="action-bar">
    <select id="dlFormat">
      <option value="360">360p</option>
      <option value="720" selected>720p</option>
      <option value="1080">1080p</option>
      <option value="audio">MP3</option>
    </select>
    <button class="primary btn" onclick="startFetch()">↓ Download to browser</button>
    <button class="btn" onclick="startSave()">↓ Save to server</button>
  </div>

  <div class="progress-section" id="progressSection">
    <div class="progress-label" id="progressLabel">Saving...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

</div>
<script>
const params = new URLSearchParams(location.search);
const videoUrl = params.get("v");
const streamFormat = params.get("f") || "720";

let cacheTriggered = false;
let activeSSE = null;

if (!videoUrl) {
  document.getElementById("loadingText").textContent = "No URL provided.";
} else {
  initWatch();
}

async function initWatch() {
  // Fetch info and stream in parallel
  const [infoRes] = await Promise.all([
    fetch(`/api/info?url=${encodeURIComponent(videoUrl)}`).then(r => r.json()).catch(() => ({}))
  ]);

  if (infoRes.title) {
    document.title = infoRes.title + " — ytdl";
    document.getElementById("videoTitle").textContent = infoRes.title;
    document.getElementById("videoSub").textContent =
      [infoRes.uploader, infoRes.duration ? fmtDur(infoRes.duration) : null].filter(Boolean).join(" · ");
  }

  // Check if already cached
  checkCacheStatus();

  const streamUrl = `/api/stream?url=${encodeURIComponent(videoUrl)}&format=${encodeURIComponent(streamFormat)}`;
  const video = document.getElementById("videoEl");
  video.src = streamUrl;
  video.style.display = "block";
  document.getElementById("playerLoading").style.display = "none";

  video.onerror = () => {
    document.getElementById("playerLoading").style.display = "flex";
    document.getElementById("loadingText").textContent = "Stream failed. Try a lower resolution.";
  };

  // Trigger background cache when playback actually starts
  video.addEventListener("play", triggerCache, { once: true });
}

async function checkCacheStatus() {
  // We can't ask the server directly what's cached, but we infer from history
  // by making a lightweight HEAD-equivalent: just check /api/stream with a
  // custom header — easier to just set UI to "caching" and update on cache done.
  // The cache dot starts neutral; once triggerCache fires it goes amber, done = green.
  setCacheDot("neutral", "not yet cached");
}

function setCacheDot(state, text) {
  const dot = document.getElementById("cacheDot");
  const label = document.getElementById("cacheText");
  dot.className = "cache-dot" + (state === "cached" ? " cached" : state === "caching" ? " caching" : "");
  label.textContent = text;
}

async function triggerCache() {
  if (cacheTriggered) return;
  cacheTriggered = true;
  setCacheDot("caching", "caching in background...");

  try {
    const res = await fetch("/api/cache", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: videoUrl })
    });
    const data = await res.json();
    if (data.alreadyCached) {
      setCacheDot("cached", "cached");
    } else {
      // Poll for completion — the server logs it but doesn't SSE for background jobs.
      // We simply wait a generous time then mark as "caching" — the user can reload
      // to verify. A proper impl would SSE the cache job too.
      setTimeout(() => setCacheDot("cached", "cached to server"), 120_000);
    }
  } catch {
    setCacheDot("neutral", "cache unavailable");
  }
}

function fmtDur(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function startFetch() {
  const format = document.getElementById("dlFormat").value;
  const a = document.createElement("a");
  a.href = `/api/fetch?url=${encodeURIComponent(videoUrl)}&format=${encodeURIComponent(format)}`;
  a.download = "";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function startSave() {
  const format = document.getElementById("dlFormat").value;
  const section = document.getElementById("progressSection");
  const label = document.getElementById("progressLabel");
  const bar = document.getElementById("progressBar");
  const text = document.getElementById("progressText");
  const err = document.getElementById("errorBanner");

  section.classList.add("visible");
  err.classList.remove("visible");
  bar.style.width = "0%";
  label.textContent = format === "audio" ? "Saving audio..." : "Saving video...";
  text.textContent = "Starting...";

  if (activeSSE) activeSSE.close();

  fetch("/api/download", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url: videoUrl, format })
  })
  .then(r => r.json())
  .then(data => {
    if (!data.jobId) throw new Error(data.error || "Failed");
    activeSSE = new EventSource(`/api/progress/${data.jobId}`);
    activeSSE.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.progress !== undefined) {
        bar.style.width = msg.progress + "%";
        text.textContent = msg.status || msg.progress + "%";
      }
      if (msg.done) {
        activeSSE.close();
        bar.style.width = "100%";
        text.textContent = "Saved ✓";
        setCacheDot("cached", "cached");
      }
      if (msg.error) {
        activeSSE.close();
        section.classList.remove("visible");
        err.textContent = msg.error;
        err.classList.add("visible");
      }
    };
    activeSSE.onerror = () => {
      activeSSE.close();
      err.textContent = "Connection lost.";
      err.classList.add("visible");
    };
  })
  .catch(e => {
    section.classList.remove("visible");
    err.textContent = e.message;
    err.classList.add("visible");
  });
}
</script>
</body>
</html>
