<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ytdl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

  <header>
    <h1><span>yt</span>dl</h1>
    <p>youtube downloader — powered by yt-dlp</p>
  </header>

  <section id="search-section">
    <div class="section-label">Search</div>
    <div class="search-row">
      <input type="text" id="searchBox" placeholder="search youtube...">
      <button onclick="search()">Search</button>
    </div>
    <div class="search-results" id="results"></div>
  </section>

  <div class="divider"></div>

  <section id="download-section">
    <div class="section-label">Download</div>
    <div class="download-form">
      <div class="url-format-row">
        <input type="url" id="url" placeholder="https://youtube.com/watch?v=...">
        <select id="format">
          <option value="360">360p</option>
          <option value="720" selected>720p</option>
          <option value="1080">1080p</option>
          <option value="audio">MP3</option>
        </select>
      </div>
      <div class="btn-row">
        <a class="btn primary watch-btn" id="watchBtn" href="#" target="_blank" onclick="updateWatchLink(event)">▶ Watch</a>
        <button class="primary" onclick="startFetch()">↓ Download to browser</button>
        <button onclick="startDownload()">↓ Save to server</button>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">Starting...</div>
      </div>

      <div class="download-result" id="downloadResult">
        ✓ Saved — <a id="downloadLink" href="#" target="_blank">open file</a>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>
  </section>

  <div class="divider"></div>

  <section id="history-section">
    <div class="section-label">History</div>
    <div class="history-list" id="history"></div>
  </section>

</div>
<script src="app.js"></script>
<script>
// Apply saved settings (accent + theme) on the main page too
(function() {
  try {
    const s = JSON.parse(localStorage.getItem("ytdl_settings") || "{}");
    const THEMES = {
      dark:   { bg:"#0a0a0a", surface:"#111111", surface2:"#1a1a1a", surface3:"#222222", border:"#2a2a2a", border2:"#3a3a3a" },
      darker: { bg:"#000000", surface:"#0a0a0a", surface2:"#111111", surface3:"#181818", border:"#1a1a1a", border2:"#222222" },
      dim:    { bg:"#18191a", surface:"#242526", surface2:"#2d2e30", surface3:"#3a3b3c", border:"#3e4042", border2:"#4e4f52" }
    };
    const r = document.documentElement.style;
    if (s.accent) {
      r.setProperty("--accent", s.accent);
      r.setProperty("--accent-dim", s.accent + "1f");
      r.setProperty("--accent-border", s.accent + "4d");
    }
    const t = THEMES[s.theme] || THEMES.dark;
    Object.entries(t).forEach(([k, v]) => r.setProperty("--" + k, v));
    if (s.quality) {
      const sel = document.getElementById("format");
      if (sel) sel.value = s.quality;
    }
  } catch {}
})();

function extractVideoId(url) {
  try {
    const u = new URL(url);
    return u.searchParams.get("v") || u.pathname.split("/").pop() || url;
  } catch { return url; }
}

function buildWatchHref() {
  const url = document.getElementById("url").value.trim();
  const format = document.getElementById("format").value;
  if (!url) return "#";
  const id = extractVideoId(url);
  const f = format === "audio" ? (localStorage.getItem("ytdl_settings") ? JSON.parse(localStorage.getItem("ytdl_settings")).quality || "720" : "720") : format;
  return `/watch?v=${encodeURIComponent(id)}&f=${encodeURIComponent(f)}`;
}

function updateWatchLink(e) {
  const href = buildWatchHref();
  if (href === "#") { e.preventDefault(); return; }
  document.getElementById("watchBtn").href = href;
}

document.getElementById("url").addEventListener("input", () => {
  document.getElementById("watchBtn").href = buildWatchHref();
});
document.getElementById("format").addEventListener("change", () => {
  document.getElementById("watchBtn").href = buildWatchHref();
});
</script>
</body>
</html>
